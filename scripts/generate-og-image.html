<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    font-family: 'Barlow', sans-serif;
    background: linear-gradient(135deg, #003870 0%, #002650 60%, #001a3a 100%);
    color: white;
    display: flex;
    overflow: hidden;
  }

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 70px;
    position: relative;
    z-index: 1;
  }

  .title {
    font-size: 82px;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 20px;
  }

  .subtitle {
    font-size: 32px;
    font-weight: 400;
    color: rgba(255,255,255,0.85);
    line-height: 1.3;
    max-width: 550px;
  }

  .domain {
    position: absolute;
    bottom: 50px;
    left: 70px;
    font-size: 24px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
  }

  /* Decorative ballot on the right */
  .ballot {
    position: absolute;
    right: 50px;
    top: 50%;
    transform: translateY(-50%);
    width: 340px;
    background: white;
    border-radius: 8px;
    padding: 28px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    opacity: 0.92;
  }

  .ballot-header {
    text-align: center;
    color: #003870;
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 2px solid #003870;
  }

  .ballot-row {
    display: flex;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid #e5e7eb;
    color: #374151;
    font-size: 14px;
  }

  .ballot-row:last-child { border-bottom: none; }

  .circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid #9ca3af;
    margin-right: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .circle.filled {
    border-color: #003870;
    background: #003870;
  }

  .circle.filled::after {
    content: '✓';
    color: white;
    font-size: 13px;
    font-weight: 700;
  }

  .votes {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #d1d5db;
  }
  .dot.active { background: #003870; }

  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.15);
    color: white;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 18px;
    font-weight: 600;
    margin-top: 24px;
    backdrop-filter: blur(4px);
  }
</style>
</head>
<body>
  <div class="main">
    <div class="title">Wahlzettel</div>
    <div class="subtitle">Kommunalwahl üben &ndash;<br/>Kumulieren &amp; Panaschieren</div>
    <div class="badge">Hessen &middot; Bayern &middot; Baden-Württemberg</div>
    <div class="domain">whlztl.de</div>
  </div>

  <div class="ballot">
    <div class="ballot-header">Musterstimmzettel</div>
    <div class="ballot-row">
      <div class="circle filled"></div>
      <span>Müller, Anna</span>
      <div class="votes">
        <div class="dot active"></div>
        <div class="dot active"></div>
        <div class="dot active"></div>
      </div>
    </div>
    <div class="ballot-row">
      <div class="circle"></div>
      <span>Schmidt, Thomas</span>
      <div class="votes">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="ballot-row">
      <div class="circle filled"></div>
      <span>Weber, Julia</span>
      <div class="votes">
        <div class="dot active"></div>
        <div class="dot active"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="ballot-row">
      <div class="circle"></div>
      <span>Fischer, Michael</span>
      <div class="votes">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="ballot-row">
      <div class="circle filled"></div>
      <span>Wagner, Sarah</span>
      <div class="votes">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="ballot-row">
      <div class="circle"></div>
      <span>Becker, Klaus</span>
      <div class="votes">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
    <div class="ballot-row">
      <div class="circle"></div>
      <span>Hoffmann, Lisa</span>
      <div class="votes">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>
  </div>
</body>
</html>
